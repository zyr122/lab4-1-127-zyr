<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>定位展示知识点视图</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .bg-ellipse {
            z-index: 9999 ; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bg-ellipse"></div>

        <div class="card card-1">
            <h4>HTML基础和HTML5</h4>
            <ul>
                <li>HTML标签与属性</li>
                <li>HTML5新增元素（视频和音频）</li>
                <li>HTML5图像元素（画布和SVG）</li>
                <li>HTML5地理定位</li>
                <li>HTML5拖放</li>
            </ul>
        </div>
        <div class="card card-2">
            <h4>CSS基础和CSS3</h4>
            <ul>
                <li>CSS选择器</li>
                <li>CSS样式</li>
                <li>CSS的过渡与动画</li>
                <li>CSS3的2D/3D转换</li>
                <li>CSS3的边框效果</li>
            </ul>
        </div>
        <div class="card card-3">
            <h4>JavaScript</h4>
            <ul>
                <li>数据类型</li>
                <li>运算符</li>
                <li>基础语法</li>
                <li>BOM对象</li>
                <li>DOM对象</li>
                <li>JS特效</li>
            </ul>
        </div>
    </div>
</body>
</html>
